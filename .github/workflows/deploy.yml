name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
    build: 
        runs-on: ubuntu-latest
        permissions:
          contents: read
          id-token: write
        steps:
          - name: Checkout code
            uses: actions/checkout@v3

          - name: configure AWS credentials
            uses: aws-actions/configure-aws-credentials@v2
            with:
              role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
              aws-region: us-east-1

          - name: login to ECR
            id: login-ecr
            uses: aws-actions/amazon-ecr-login@v1

          - name: Build and push Docker image
            id: build-image
            env:
                ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            run: |
              docker build -t $ECR_REGISTRY/finance-tracker:${{ github.sha }} .
              docker push $ECR_REGISTRY/finance-tracker:${{ github.sha }}

          - name: Deploy to ECS
            run: |
              aws ecs update-service --cluster finance-tracker-cluster --service finance-tracker-service --force-new-deployment

